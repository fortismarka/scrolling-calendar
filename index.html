<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon — Planning Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1b2240;
    --navy-mid: #253059;
    --navy-light: #3a4a7a;
    --today-color: #d95f00;
    --today-bg: #fff4ec;
    --select-color: #1a73e8;
    --select-bg: #e8f0fe;
    --month-a: #ffffff;
    --month-b: #f3f7fd;
    --holiday-a: #fffaf3;
    --holiday-b: #fef5e7;
    --border-main: #dde3ed;
    --border-month: #b8c4d8;
    --text-main: #1e2740;
    --text-muted: #6b7694;
    --text-week: #8892b0;
    --header-h: 56px;
    --cell-h: 58px;
  }

  html, body {
    height: 100%;
    background: #161d35;
    font-family: 'Figtree', sans-serif;
    color: var(--text-main);
  }

  .page-outer {
    display: flex;
    justify-content: center;
    height: 100vh;
    background: #161d35;
  }

  .page {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    width: 100%;
    max-width: 920px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
  }

  /* ── TOP HEADER BAR ── */
  .topbar {
    height: var(--header-h);
    background: var(--navy);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 14px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 100;
  }

  .topbar-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .topbar-logo svg {
    width: 26px;
    height: 26px;
    opacity: 0.9;
  }

  .topbar-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffffff;
    opacity: 0.9;
  }

  .topbar-divider {
    width: 1px;
    height: 22px;
    background: rgba(255,255,255,0.15);
  }

  .topbar-sub {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.5px;
  }

  .topbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .today-badge {
    background: transparent;
    border: 1.5px solid var(--today-color);
    color: var(--today-color);
    font-family: 'Figtree', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .today-badge:hover {
    background: var(--today-color);
    color: white;
  }

  #current-month-display {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    min-width: 140px;
    text-align: right;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }

  /* ── CALENDAR SCROLL AREA ── */
  .cal-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: auto;
    background: white;
  }

  /* ── TABLE ── */
  table {
    border-collapse: collapse;
    width: 100%;
    min-width: 680px;
    table-layout: fixed;
  }

  colgroup col.col-month { width: 46px; }
  colgroup col.col-week  { width: 44px; }
  colgroup col.col-day   { width: calc((100% - 82px) / 7); }

  /* ── STICKY COLUMN HEADERS ── */
  thead {
    position: sticky;
    top: 0;
    z-index: 50;
  }

  thead tr th {
    background: var(--navy);
    color: rgba(255,255,255,0.85);
    font-size: 11.5px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    text-align: center;
    padding: 10px 4px;
    border-right: 1px solid var(--navy-light);
    border-bottom: 2px solid var(--navy-light);
  }

  thead tr th.th-month {
    font-size: 9px;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.3);
  }

  thead tr th.th-week {
    font-size: 9.5px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.45);
  }

  thead tr th:last-child {
    border-right: none;
  }

  /* Saturday and Sunday subtle header tint */
  thead tr th.th-sun,
  thead tr th.th-sat {
    color: rgba(255,200,150,0.85);
  }

  /* ── MONTH LABEL CELL ── */
  td.month-label {
    background: var(--navy);
    color: rgba(255,255,255,0.75);
    text-align: center;
    vertical-align: middle;
    padding: 0;
    border-right: 2px solid var(--navy-light);
    border-bottom: 1px solid var(--navy-mid);
    cursor: pointer;
    transition: filter 0.15s;
  }

  td.month-label:hover { filter: brightness(1.15); }

  td.month-label .month-inner {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    height: 100%;
    width: 100%;
    gap: 3px;
  }

  td.month-label .month-name {
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-align: center;
  }

  td.month-label .month-year {
    writing-mode: vertical-lr;
    transform: rotate(180deg);
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.32);
    font-family: 'DM Mono', monospace;
    text-align: center;
  }

  /* Alternating month colors on label */
  td.month-label.ml-even {
    background: linear-gradient(180deg, #1e2a4a 0%, #1b2240 100%);
  }
  td.month-label.ml-odd {
    background: linear-gradient(180deg, #263352 0%, #1e2a4a 100%);
  }

  /* ── WEEK NUMBER CELL ── */
  td.week-num {
    background: #f7f9fc;
    text-align: center;
    vertical-align: middle;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-week);
    cursor: pointer;
    border-right: 1px solid var(--border-main);
    border-bottom: 1px solid var(--border-main);
    user-select: none;
    transition: background 0.12s, color 0.12s;
    font-family: 'DM Mono', monospace;
  }

  td.week-num:hover {
    background: #eaeffa;
    color: var(--select-color);
  }

  /* ── DAY CELLS ── */
  td.day-cell {
    text-align: center;
    vertical-align: middle;
    height: var(--cell-h);
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    border-right: 1px solid var(--border-main);
    border-bottom: 1px solid var(--border-main);
    position: relative;
    user-select: none;
    transition: background 0.1s;
    font-variant-numeric: tabular-nums;
  }

  td.day-cell:last-child { border-right: none; }

  td.day-cell:hover:not(.today):not(.selected-day) {
    background: #eef3fb !important;
  }

  /* ── MONTH ALTERNATING BACKGROUNDS ── */
  td.month-even { background: var(--month-a); }
  td.month-odd  { background: var(--month-b); }

  /* ── MONTH BOUNDARY (left edge when month starts mid-row) ── */
  td.month-start {
    border-left: 2px solid var(--border-month) !important;
  }

  /* ── HOLIDAY ── */
  td.day-cell.holiday.month-even { background: var(--holiday-a); }
  td.day-cell.holiday.month-odd  { background: var(--holiday-b); }

  td.day-cell.holiday::before {
    content: '';
    position: absolute;
    top: 5px;
    right: 5px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #e8a040;
    opacity: 0.7;
  }

  /* holiday tooltip */
  td.day-cell.holiday::after {
    content: attr(data-holiday);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1b2240;
    color: white;
    padding: 4px 9px;
    border-radius: 5px;
    font-size: 10.5px;
    font-weight: 500;
    white-space: nowrap;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    font-family: 'Figtree', sans-serif;
    letter-spacing: 0.2px;
  }

  td.day-cell.holiday:hover::after { opacity: 1; }

  /* holiday nickname replaces date number */
  td.day-cell.holiday-named .holiday-nick {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.15;
  }

  td.day-cell.holiday-named .holiday-nick .hk-name {
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: #b36a00;
    line-height: 1.2;
    text-align: center;
  }

  td.day-cell.holiday-named .holiday-nick .hk-date {
    font-size: 9px;
    font-weight: 400;
    color: #c49040;
    opacity: 0.75;
    font-family: 'DM Mono', monospace;
  }

  /* ── TODAY ── */
  td.day-cell.today {
    border: 3px solid var(--today-color) !important;
    background: var(--today-bg) !important;
    font-weight: 700;
    color: var(--today-color);
    z-index: 5;
  }

  /* ── SELECTED DAY ── */
  td.day-cell.selected-day {
    border: 3px solid var(--select-color) !important;
    background: var(--select-bg) !important;
    font-weight: 600;
    color: var(--select-color);
    z-index: 5;
  }

  /* ── SELECTED MONTH (precise cell-level borders) ── */
  td.mhl {
    background: var(--select-bg) !important;
    color: var(--select-color);
    border-color: rgba(26,115,232,0.18) !important;
  }
  td.mhl-t { border-top:    2.5px solid var(--select-color) !important; }
  td.mhl-b { border-bottom: 2.5px solid var(--select-color) !important; }
  td.mhl-l { border-left:   2.5px solid var(--select-color) !important; }
  td.mhl-r { border-right:  2.5px solid var(--select-color) !important; }
  td.month-label.selected-month-label {
    border: 2.5px solid var(--select-color) !important;
    filter: brightness(1.25);
  }

  /* ── SELECTED WEEK ── */
  tr.selected-week td:not(.month-label) {
    background: var(--select-bg) !important;
    border-top: 2.5px solid var(--select-color) !important;
    border-bottom: 2.5px solid var(--select-color) !important;
    color: var(--select-color);
  }

  tr.selected-week td.week-num {
    border-left: 2.5px solid var(--select-color) !important;
    color: var(--select-color);
    font-weight: 700;
  }

  tr.selected-week td.day-cell:last-child {
    border-right: 2.5px solid var(--select-color) !important;
  }

  /* ── SCROLLBAR ── */
  .cal-scroll::-webkit-scrollbar { width: 6px; }
  .cal-scroll::-webkit-scrollbar-track { background: #f0f2f7; }
  .cal-scroll::-webkit-scrollbar-thumb { background: #c0c8dc; border-radius: 3px; }
  .cal-scroll::-webkit-scrollbar-thumb:hover { background: #9baac8; }

  /* ── BUILT BY ── */
  .built-by {
    font-size: 9px;
    font-weight: 400;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.4px;
    margin-top: 1px;
  }
  .built-by a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
  }
  .built-by a:hover { color: rgba(255,255,255,0.6); text-decoration: underline; }

  /* ── DAY DIFF CIRCLE ── */
  .diff-circle {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .diff-circle.has-value {
    border-color: var(--select-color);
    background: rgba(26,115,232,0.15);
  }
  .diff-circle .diff-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.2);
    line-height: 1;
    transition: all 0.2s;
  }
  .diff-circle.has-value .diff-num { color: #7eb8ff; }
  .diff-circle .diff-label {
    display: none;
  }

  /* ── LEGEND ── */
  .legend {
    position: fixed;
    bottom: 14px;
    right: 16px;
    background: white;
    border: 1px solid var(--border-main);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    gap: 14px;
    align-items: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    z-index: 90;
    font-size: 10.5px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .legend-swatch {
    width: 13px;
    height: 13px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .ls-today { border: 2.5px solid var(--today-color); background: var(--today-bg); }
  .ls-select { border: 2.5px solid var(--select-color); background: var(--select-bg); }
  .ls-holiday { background: var(--holiday-a); border: 1px solid #e8c080; position: relative; }
  .ls-holiday::after {
    content: '';
    position: absolute;
    top: 1px;
    right: 1px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #e8a040;
  }
</style>
</head>
<body>
<div class="page-outer">
<div class="page">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="4" width="24" height="21" rx="2.5" stroke="white" stroke-width="1.5" fill="none" opacity="0.7"/>
        <path d="M1 9h24" stroke="white" stroke-width="1.5" opacity="0.7"/>
        <rect x="6" y="1" width="2.5" height="6" rx="1.25" fill="white" opacity="0.7"/>
        <rect x="17.5" y="1" width="2.5" height="6" rx="1.25" fill="white" opacity="0.7"/>
        <rect x="5.5" y="13" width="4" height="4" rx="0.8" fill="white" opacity="0.5"/>
        <rect x="11" y="13" width="4" height="4" rx="0.8" fill="white" opacity="0.5"/>
        <rect x="16.5" y="13" width="4" height="4" rx="0.8" fill="#d95f00" opacity="0.9"/>
        <rect x="5.5" y="19" width="4" height="3" rx="0.8" fill="white" opacity="0.3"/>
        <rect x="11" y="19" width="4" height="3" rx="0.8" fill="white" opacity="0.3"/>
      </svg>
    </div>
    <div>
      <div class="topbar-title">Horizon</div>
      <div class="built-by">by <a href="https://fortismarka.com" target="_blank">Fortis Marka</a></div>
    </div>
    <div class="topbar-divider"></div>
    <span class="topbar-sub">Planning Calendar</span>
    <div class="topbar-right">
      <div class="diff-circle" id="diffCircle">
        <span class="diff-num" id="diffNum">—</span>
        <span class="diff-label" id="diffLabel">days</span>
      </div>
      <span id="current-month-display"></span>
      <button class="today-badge" onclick="scrollToToday()">⬤ Today</button>
    </div>
  </header>

  <!-- CALENDAR SCROLL -->
  <div class="cal-scroll" id="calScroll">
    <table id="calTable">
      <colgroup>
        <col class="col-month">
        <col class="col-week">
        <col class="col-day">
        <col class="col-day">
        <col class="col-day">
        <col class="col-day">
        <col class="col-day">
        <col class="col-day">
        <col class="col-day">
      </colgroup>
      <thead>
        <tr>
          <th class="th-month"></th>
          <th class="th-week">WK</th>
          <th class="th-sun">Sun</th>
          <th>Mon</th>
          <th>Tue</th>
          <th>Wed</th>
          <th>Thu</th>
          <th>Fri</th>

      </thead>
      <tbody id="calBody"></tbody>
    </table>
  </div>

  <!-- LEGEND -->
  <div class="legend">

      <div class="legend-swatch ls-today"></div>

<script>
// ── UTILITIES ────────────────────────────────────────────────────────────────

const today = new Date();
today.setHours(0, 0, 0, 0);

function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWeekNum(d) {
  const utc = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = utc.getUTCDay() || 7;
  utc.setUTCDate(utc.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(utc.getUTCFullYear(), 0, 1));
  return Math.ceil(((utc - yearStart) / 86400000 + 1) / 7);
}

// ── FEDERAL HOLIDAYS ─────────────────────────────────────────────────────────

function getNthWeekday(year, month, weekday, n) {
  const d = new Date(year, month, 1);
  let count = 0;
  while (true) {
    if (d.getDay() === weekday) { count++; if (count === n) return d; }
    d.setDate(d.getDate() + 1);
  }
}

function getLastWeekday(year, month, weekday) {
  const d = new Date(year, month + 1, 0);
  while (d.getDay() !== weekday) d.setDate(d.getDate() - 1);
  return d;
}

function buildHolidays(year) {
  const h = {};
  function add(date, name) {
    h[dateKey(date)] = name;
    let obs = new Date(date);
    if (date.getDay() === 6) obs.setDate(date.getDate() - 1);
    else if (date.getDay() === 0) obs.setDate(date.getDate() + 1);
    if (dateKey(obs) !== dateKey(date)) h[dateKey(obs)] = name + ' (Observed)';
  }
  add(new Date(year,  0,  1), "New Year's Day");
  add(getNthWeekday(year, 0, 1, 3),    "Martin Luther King Jr. Day");
  add(getNthWeekday(year, 1, 1, 3),    "Presidents' Day");
  add(getLastWeekday(year, 4, 1),      "Memorial Day");
  add(new Date(year,  5, 19),          "Juneteenth");
  add(new Date(year,  6,  4),          "Independence Day");
  add(getNthWeekday(year, 8, 1, 1),    "Labor Day");
  add(getNthWeekday(year, 9, 1, 2),    "Columbus Day");
  add(new Date(year, 10, 11),          "Veterans Day");
  add(getNthWeekday(year, 10, 4, 4),   "Thanksgiving Day");
  add(new Date(year, 11, 25),          "Christmas Day");
  return h;
}

const holidays = {};
const thisYear = today.getFullYear();
for (let y = thisYear - 1; y <= thisYear + 2; y++) {
  Object.assign(holidays, buildHolidays(y));
}

// ── DATE RANGE ───────────────────────────────────────────────────────────────

const startDate = new Date(today);
startDate.setFullYear(startDate.getFullYear() - 1);
while (startDate.getDay() !== 0) startDate.setDate(startDate.getDate() - 1);

const endDate = new Date(today);
endDate.setMonth(endDate.getMonth() + 12);
while (endDate.getDay() !== 6) endDate.setDate(endDate.getDate() + 1);

// ── GENERATE WEEKS ───────────────────────────────────────────────────────────

const weeks = [];
const cur = new Date(startDate);
while (cur <= endDate) {
  const week = [];
  for (let d = 0; d < 7; d++) {
    week.push(new Date(cur));
    cur.setDate(cur.getDate() + 1);
  }
  weeks.push(week);
}

// ── MONTH GROUPS (based on Sunday of each week) ───────────────────────────────

const monthGroups = [];
let prevMK = null;
weeks.forEach((week, i) => {
  const sun = week[0];
  const mk = `${sun.getFullYear()}-${sun.getMonth()}`;
  if (mk !== prevMK) {
    monthGroups.push({ month: sun.getMonth(), year: sun.getFullYear(), startRow: i, rowspan: 0 });
    prevMK = mk;
  }
  monthGroups[monthGroups.length - 1].rowspan++;
});

// rowIdx → monthGroup
const rowToMG = {};
monthGroups.forEach(mg => {
  for (let r = mg.startRow; r < mg.startRow + mg.rowspan; r++) rowToMG[r] = mg;
});

// monthGroup index for color alternating
monthGroups.forEach((mg, i) => { mg.idx = i; });

const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

function mgColorClass(mg) {
  return mg.idx % 2 === 0 ? 'month-even' : 'month-odd';
}

function mlColorClass(mg) {
  return mg.idx % 2 === 0 ? 'ml-even' : 'ml-odd';
}

function dayColorClass(date) {
  // determine which month group this date falls into
  // Use the same logic: find the month group that claims this week
  // For day color, base on actual date's month parity vs month group
  const absMonth = date.getFullYear() * 12 + date.getMonth();
  return absMonth % 2 === 0 ? 'month-even' : 'month-odd';
}

// ── BUILD TABLE ───────────────────────────────────────────────────────────────

const tbody = document.getElementById('calBody');
const allCells = []; // allCells[rowIdx][dayIdx] = td
let todayRow = null;

weeks.forEach((week, rowIdx) => {
  const tr = document.createElement('tr');
  tr.dataset.rowIdx = rowIdx;

  const mg = rowToMG[rowIdx];

  // Month label cell (only on first row of each month group)
  if (mg && mg.startRow === rowIdx) {
    const td = document.createElement('td');
    td.className = `month-label ${mlColorClass(mg)}`;
    td.rowSpan = mg.rowspan;
    td.innerHTML = `<div class="month-inner"><span class="month-name">${MONTH_NAMES[mg.month]}</span><span class="month-year">${mg.year}</span></div>`;
    td.addEventListener('click', e => { e.stopPropagation(); handleMonthClick(mg, td); });
    mg.labelTd = td;
    tr.appendChild(td);
  }

  // Track rows per month group
  if (!mg.rows) mg.rows = [];
  mg.rows.push(tr);

  // Week number
  const wkTd = document.createElement('td');
  wkTd.className = 'week-num';
  wkTd.textContent = String(getWeekNum(week[0])).padStart(2, '0');
  wkTd.title = 'Click to highlight week';
  wkTd.addEventListener('click', e => { e.stopPropagation(); handleWeekClick(tr); });
  tr.appendChild(wkTd);

  // Day cells
  week.forEach((date, dayIdx) => {
    const td = document.createElement('td');
    td.className = 'day-cell';

    // Month color (based on actual date's month)
    td.classList.add(dayColorClass(date));

    // Month boundary marker (new month starts mid-row)
    if (date.getDate() === 1 && dayIdx > 0) {
      td.classList.add('month-start');
    }

    // Holiday
    const hk = dateKey(date);
    if (holidays[hk]) {
      td.classList.add('holiday');
      td.dataset.holiday = holidays[hk];

      const isObserved = holidays[hk].includes('(Observed)');

      // Nickname map (only for non-observed holidays)
      const nicknames = {
        "New Year's Day":   date => String(date.getFullYear()),
        "Martin Luther King Jr. Day": () => 'MLK',
        "Presidents' Day":  () => 'Presidents\nDay',
        "Memorial Day":     () => 'Memorial\nDay',
        "Juneteenth":       () => 'Juneteenth',
        "Independence Day": () => '4th\nJuly',
        "Labor Day":        () => 'Labor\nDay',
        "Columbus Day":     () => 'Columbus\nDay',
        "Veterans Day":     () => 'Veterans\nDay',
        "Thanksgiving Day": () => 'Thanksgiving',
        "Christmas Day":    () => 'Christmas',
      };

      const matchKey = Object.keys(nicknames).find(k => holidays[hk] === k);
      if (!isObserved && matchKey) {
        const nick = nicknames[matchKey](date);
        td.classList.add('holiday-named');
        td.dataset.nick = nick;
        const lines = nick.split('\n');
        td.innerHTML = `<div class="holiday-nick">${lines.map((l,i) => `<span class="${i===0?'hk-name':'hk-date'}">${l}</span>`).join('')}</div>`;
      }
    }

    // Today
    if (sameDay(date, today)) {
      td.classList.add('today');
      todayRow = tr;
    }

    td.textContent = date.getDate();
    if (td.classList.contains('holiday-named')) {
      // nickname already set via innerHTML — restore it, textContent nuked it
      const nick = td.dataset.nick;
      const lines = nick.split('\n');
      td.innerHTML = `<div class="holiday-nick">${lines.map((l,i) => `<span class="${i===0?'hk-name':'hk-date'}">${l}</span>`).join('')}</div>`;
    }
    td.addEventListener('click', e => { e.stopPropagation(); handleDayClick(td); });
    if (!allCells[rowIdx]) allCells[rowIdx] = [];
    allCells[rowIdx][dayIdx] = td;
    tr.appendChild(td);
  });

  tbody.appendChild(tr);
});

// ── DAY DIFF CIRCLE ──────────────────────────────────────────────────────────

const diffCircle = document.getElementById('diffCircle');
const diffNum    = document.getElementById('diffNum');
const diffLabel  = document.getElementById('diffLabel');

function updateDiffCircle(targetDate) {
  if (!targetDate) {
    diffCircle.classList.remove('has-value');
    diffNum.textContent = '—';
    diffLabel.textContent = 'days';
    return;
  }
  const msPerDay = 86400000;
  const diff = Math.round((targetDate - today) / msPerDay);
  const abs  = Math.abs(diff);
  diffCircle.classList.add('has-value');
  diffNum.textContent = (diff > 0 ? '+' : diff < 0 ? '-' : '') + abs;
  diffLabel.textContent = abs === 1 ? 'day' : 'days';
}

// ── SELECTION STATE ───────────────────────────────────────────────────────────

let selectedDay   = null;
let selectedWeek  = null;
let selectedMonth = null;

function clearAll() {
  if (selectedDay)  { selectedDay.classList.remove('selected-day');   selectedDay  = null; }
  if (selectedWeek) { selectedWeek.classList.remove('selected-week'); selectedWeek = null; }
  if (selectedMonth) {
    if (selectedMonth.hlCells) {
      selectedMonth.hlCells.forEach(td => td.classList.remove('mhl','mhl-t','mhl-b','mhl-l','mhl-r'));
    }
    if (selectedMonth.labelTd) selectedMonth.labelTd.classList.remove('selected-month-label');
    selectedMonth = null;
  }
  updateDiffCircle(null);
}

function highlightMonth(mg) {
  const m = mg.month, y = mg.year;
  const inSet = new Set();
  for (let ri = 0; ri < weeks.length; ri++) {
    for (let di = 0; di < 7; di++) {
      const d = weeks[ri][di];
      if (d.getMonth() === m && d.getFullYear() === y) inSet.add(`${ri}-${di}`);
    }
  }
  const hlCells = [];
  inSet.forEach(key => {
    const [ri, di] = key.split('-').map(Number);
    const td = allCells[ri] && allCells[ri][di];
    if (!td) return;
    td.classList.add('mhl');
    if (!inSet.has(`${ri-1}-${di}`)) td.classList.add('mhl-t');
    if (!inSet.has(`${ri+1}-${di}`)) td.classList.add('mhl-b');
    if (!inSet.has(`${ri}-${di-1}`)) td.classList.add('mhl-l');
    if (!inSet.has(`${ri}-${di+1}`)) td.classList.add('mhl-r');
    hlCells.push(td);
  });
  mg.hlCells = hlCells;
}

function handleMonthClick(mg, td) {
  const wasMe = selectedMonth === mg;
  clearAll();
  if (!wasMe) {
    highlightMonth(mg);
    td.classList.add('selected-month-label');
    mg.labelTd = td;
    selectedMonth = mg;
  }
}

function handleDayClick(td) {
  if (td.classList.contains('today')) { clearAll(); return; }
  const wasMe = td === selectedDay;
  clearAll();
  if (!wasMe) {
    td.classList.add('selected-day');
    selectedDay = td;
    // recover the date from the cell's position
    const tr = td.closest('tr');
    const rowIdx = parseInt(tr.dataset.rowIdx);
    const cellIdx = Array.from(tr.querySelectorAll('td.day-cell')).indexOf(td);
    updateDiffCircle(weeks[rowIdx][cellIdx]);
  }
}

function handleWeekClick(tr) {
  const wasMe = tr === selectedWeek;
  clearAll();
  if (!wasMe) { tr.classList.add('selected-week'); selectedWeek = tr; }
}

// Click anywhere outside → clear selection
document.addEventListener('click', () => clearAll());

// ── SCROLL TO TODAY ───────────────────────────────────────────────────────────

function scrollToToday() {
  if (todayRow) {
    todayRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

setTimeout(scrollToToday, 80);

// ── CURRENT MONTH DISPLAY (updates on scroll) ─────────────────────────────────

const calScroll   = document.getElementById('calScroll');
const monthDisplay = document.getElementById('current-month-display');

function updateMonthDisplay() {
  // Find which row is at ~30% from top of viewport
  const scrollTop   = calScroll.scrollTop;
  const viewHeight  = calScroll.clientHeight;
  const targetY     = scrollTop + viewHeight * 0.25;
  const headerH     = 37; // thead approx height
  const rowH        = 59;
  const rowIdx      = Math.max(0, Math.min(weeks.length - 1, Math.floor((targetY - headerH) / rowH)));
  const mg          = rowToMG[rowIdx];
  if (mg) {
    monthDisplay.textContent = `${MONTH_NAMES[mg.month].toUpperCase()} ${mg.year}`;
  }
}

calScroll.addEventListener('scroll', updateMonthDisplay, { passive: true });
updateMonthDisplay();
</script>
